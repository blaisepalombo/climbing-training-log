<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climbing Training Log</title>
  <link rel="stylesheet" href="css/styles.css">
  <script type="module" src="js/main.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <nav>
    <h1>Climbing Training Log</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="log.html">Log Entry</a></li>
      <li><a href="history.html">History</a></li>
      <li><a href="progress.html">Progress</a></li>
    </ul>
  </nav>
</header>

<main>
  <h2>Dashboard</h2>

  <section>
    <h3>Total Logged Entries</h3>
    <p id="totalSessions">0</p>
  </section>

  <section>
    <h3>Most Recent Entry</h3>
    <p id="recentWorkout">No entries logged yet.</p>
  </section>

  <section>
    <h3>Current Projects</h3>
    <div id="currentProjects">
      <p>No current projects right now.</p>
    </div>
  </section>

  <section class="quote-section">
    <div class="quote-header">
      <h3>Motivation for Today</h3>
      <button id="newQuoteBtn" class="button-secondary" type="button">New Quote</button>
    </div>

    <p id="quoteText" class="quote-text">Loading quote...</p>
    <p id="quoteAuthor" class="quote-author"></p>
    <p id="quoteStatus" class="quote-status" aria-live="polite"></p>

    <p class="quote-credit">
      Quotes powered by
      <a href="https://quoteslate.vercel.app" target="_blank" rel="noopener noreferrer">QuoteSlate API</a>
    </p>
  </section>
</main>

</body>
</html>
