<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Workout</title>
  <link rel="stylesheet" href="css/styles.css">
  <script type="module" src="js/main.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <nav>
    <h1>Climbing Training Log</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="log.html">Log Workout</a></li>
      <li><a href="history.html">History</a></li>
      <li><a href="progress.html">Progress</a></li>
    </ul>
  </nav>
</header>

<main>
  <h2>Log Training Session</h2>

  <form id="workoutForm">

    <label for="date">Date</label>
    <input type="date" id="date" name="date" required>

    <label for="type">Workout Type</label>
    <select id="type" name="type">
      <option>Hangboard</option>
      <option>Strength</option>
      <option>Conditioning</option>
    </select>

    <label for="exercise">Exercise</label>
    <input type="text" id="exercise" name="exercise" placeholder="Pull ups, finger curls, etc">

    <label for="sets">Sets</label>
    <input type="number" id="sets" name="sets">

    <label for="reps">Reps</label>
    <input type="number" id="reps" name="reps">

    <label for="notes">Notes</label>
    <textarea id="notes" name="notes"></textarea>

    <button type="submit">Save Workout</button>

  </form>
</main>

</body>
</html>
