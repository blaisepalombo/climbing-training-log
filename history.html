<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout History</title>
  <link rel="stylesheet" href="css/styles.css">
  <script type="module" src="js/main.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="hero-header">
  <nav class="site-nav">
    <h1>Climbing Training Log</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="log.html">Log Entry</a></li>
      <li><a href="history.html" aria-current="page">History</a></li>
      <li><a href="progress.html">Progress</a></li>
    </ul>
  </nav>

  <div class="hero-banner hero-banner--small">
    <img src="images/history.jpg" alt="Climbing history" class="hero-banner-image">
    <div class="hero-overlay">
      <h2 class="hero-title">Training History</h2>
    </div>
  </div>
</header>

<main>
  <h2>Training History</h2>

  <section class="history-toolbar">
    <div class="history-filter-group">
      <label for="historyFilter">Filter Entries</label>
      <select id="historyFilter">
        <option value="all">All Visible Entries</option>
        <option value="climbing">Climbing Only</option>
        <option value="training">Training Only</option>
        <option value="Bouldering">Bouldering</option>
        <option value="Top Rope">Top Rope</option>
        <option value="Lead">Lead</option>
        <option value="Hangboard">Hangboard</option>
        <option value="Strength">Strength</option>
        <option value="Conditioning">Conditioning</option>
      </select>
    </div>
  </section>

  <section id="historyList">
    <p>No workouts logged yet.</p>
  </section>
</main>

<footer class="site-footer">
  <p>Climbing Training Log</p>
  <p>Built for WDD 330</p>
</footer>

</body>
</html>
